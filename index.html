<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>AVA-Wealth 理財中心 v1.6</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="avawealth-192.png">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #101525 0%, #1e2a4a 100%);
            margin: 0; padding: 60px 20px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: #ffffff; overflow-x: hidden;
        }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { 
            font-size: 28px; margin: 0 0 10px 0; font-weight: 800; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .header-version {
            font-size: 14px; font-weight: 600; color: #101525;
            background-color: #e0b354; padding: 3px 8px; border-radius: 12px; vertical-align: middle;
        }
        .header p { font-size: 16px; color: #c9ccd3; margin: 0; font-weight: 300; }

        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 45px; max-width: 340px; width: 100%; }
        .app-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #ffffff; transition: transform 0.2s ease; }
        .app-item:active { transform: scale(0.92); }
        
        .logo-wrapper {
            width: 90px; height: 90px; border-radius: 22px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4); background-color: #0c101a;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 14px; border: 2px solid rgba(255,255,255,0.05);
        }
        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .app-name { font-size: 16px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        .btn-philosophy {
            margin-top: 50px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15); color: #e0b354;
            padding: 14px 24px; border-radius: 25px; font-size: 15px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s;
        }
        .btn-philosophy:active { background: rgba(255, 255, 255, 0.15); }

        .philosophy-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #101525 0%, #1e2a4a 100%);
            z-index: 100; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow-y: auto; padding: 40px 20px 20px;
        }
        .philosophy-view.active { transform: translateY(0); }

        .btn-back-bottom {
            display: block; width: 100%; padding: 16px; margin-top: 10px; margin-bottom: 40px;
            background: linear-gradient(135deg, #e0b354 0%, #c29536 100%); color: #101525;
            text-align: center; border-radius: 25px; font-size: 16px; font-weight: bold;
            border: none; cursor: pointer; box-shadow: 0 6px 15px rgba(224, 179, 84, 0.3);
            transition: transform 0.2s;
        }
        .btn-back-bottom:active { transform: scale(0.96); }
        
        .version-tag { margin-top: auto; padding-top: 40px; font-size: 12px; color: rgba(255, 255, 255, 0.2); }

        .triangle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .light-card { background: #ffffff; border-radius: 16px; padding: 16px 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; color: #101525; border: 1px solid #e4e7eb; }
        .lc-title { font-size: 15px; font-weight: 800; color: #1e2a4a; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .lc-icon { font-size: 18px; }
        .lc-trade { font-size: 11px; font-weight: 700; background: #f5f7fa; border: 1px solid #e4e7eb; color: #3e4c59; padding: 6px; border-radius: 8px; margin-bottom: 10px; text-align: center; line-height: 1.4; }
        .lc-trade .lose { color: #e53935; } .lc-trade .gain { color: #43a047; }
        .lc-desc { font-size: 12px; color: #52606d; line-height: 1.5; font-weight: 500; }
        .tag-item { background: rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 20px; font-size: 14px; color: #fff; border: 1px solid rgba(255,255,255,0.2); font-weight: 500; }
    </style>
</head>
<body>

<div id="loginScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #101525 0%, #1e2a4a 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div class="logo-wrapper" style="width: 100px; height: 100px; margin-bottom: 20px;">
        <img src="avawealth-192.png" alt="AVA Logo" style="width: 100%; height: 100%; border-radius: 22px; object-fit: cover;">
    </div>
    <h1 style="color: #fff; font-size: 26px; margin: 0 0 10px 0;">AVA-Wealth</h1>
    <p style="color: #a0aabf; margin: 0 0 30px 0; font-size: 14px;">請輸入團隊專屬密碼</p>
    <input type="password" id="pwdInput" placeholder="輸入密碼" style="padding: 14px 20px; border-radius: 25px; border: 1px solid rgba(224, 179, 84, 0.5); background: rgba(0,0,0,0.2); color: #fff; font-size: 16px; margin-bottom: 20px; text-align: center; outline: none; width: 260px;">
    <button id="loginBtn" onclick="verifyLogin()" style="padding: 14px 0; width: 260px; border-radius: 25px; background: linear-gradient(135deg, #e0b354 0%, #c29536 100%); color: #101525; font-size: 16px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(224, 179, 84, 0.2);">登入系統</button>
    <p id="loginError" style="color: #ff6b6b; font-size: 14px; margin-top: 15px; display: none;">密碼錯誤，請重新輸入</p>
</div>

<div class="header">
    <h1>AVA-Wealth <span class="header-version">v1.6</span></h1>
    <p>您的資產與財富中心</p>
</div>

<div class="app-grid">
    <a href="https://ivancww.github.io/onetime" class="app-item">
        <div class="logo-wrapper"><img src="onetime-logo.png" alt="OneTime 工具"></div>
        <div class="app-name">OneTime</div>
    </a>
    <a href="https://ivancww.github.io/WealthAPP" class="app-item">
        <div class="logo-wrapper"><img src="wealthapp-logo.png" alt="WealthAPP 財富"></div>
        <div class="app-name">WealthAPP</div>
    </a>
</div>

<div class="btn-philosophy" onclick="togglePhilosophy(true)">
    <span>💡</span> 財富金三角：理財必修課
</div>

<div class="version-tag">v1.6</div>

<div class="philosophy-view" id="philosophyPage">
    <!-- 金三角內容省略... (維持原樣) -->
    <button class="btn-back-bottom" onclick="togglePhilosophy(false)">返回首頁</button>
</div>

<script>
    function togglePhilosophy(show) {
        const page = document.getElementById('philosophyPage');
        if (show) { page.classList.add('active'); page.scrollTop = 0; } 
        else { page.classList.remove('active'); }
    }

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwmpVo8uGg8ZaC-oTFKdTdLAgCibw8FhD0UpcuMA6wWKwV0GWPWhO7hfFqL4NYRds2v/exec';
    
    async function verifyLogin() {
        const inputVal = pwdInput.value.trim();
        if (!inputVal) return;
        loginBtn.innerText = '驗證中...';
        loginError.style.display = 'none';

        try {
            const response = await fetch(GAS_URL + "?pwd=" + encodeURIComponent(inputVal), { method: 'GET', redirect: 'follow' });
            const data = await response.json();
            if (data.status === "success") {
                localStorage.setItem('ava_auth_password', inputVal);
                loginScreen.style.display = 'none';
            } else {
                loginError.innerText = '密碼錯誤';
                loginError.style.display = 'block';
            }
        } catch (e) {
            loginError.innerText = '連線失敗';
            loginError.style.display = 'block';
        }
        loginBtn.innerText = '登入系統';
    }

    window.addEventListener('load', () => {
        const saved = localStorage.getItem('ava_auth_password');
        if (saved) {
            loginScreen.style.display = 'none';
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js?v=9');
    }
</script>
</body>
</html>
