<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVA-Wealth 理財中心</title>
    <!-- 連結 PWA 的 manifest 檔案 -->
    <link rel="manifest" href="manifest.json">
    <!-- 設置 iOS 狀態列顏色與主畫面圖標 (使用新的 avawealth-192.png) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="avawealth-192.png">

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #101525 0%, #1e2a4a 100%);
            margin: 0;
            padding: 60px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 28px;
            color: #ffffff;
            margin: 0 0 10px 0;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .header p {
            font-size: 16px;
            color: #c9ccd3;
            margin: 0;
            font-weight: 300;
        }

        /* App 圖標排列網格 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 45px;
            max-width: 340px;
            width: 100%;
        }

        /* 單個 App 按鈕樣式 */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s ease;
        }
        .app-item:active {
            transform: scale(0.92);
        }

        /* Logo 圖片容器 (保持原有 sub-app Logo，但調整容器樣式以配合新主題) */
        .logo-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 22px; /* iOS 圓角 */
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            background-color: #0c101a;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            border: 2px solid rgba(255,255,255,0.05);
        }
        
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* App 名稱 */
        .app-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>AVA-Wealth</h1>
    <p>您的資產與財富中心</p>
</div>

<div class="app-grid">
    <!-- App 1: OneTime -->
    <a href="https://ivancww.github.io/onetime" class="app-item">
        <div class="logo-wrapper">
            <img src="onetime-logo.png" alt="OneTime 工具">
        </div>
        <div class="app-name">OneTime</div>
    </a>

    <!-- App 2: WealthAPP -->
    <a href="https://ivancww.github.io/WealthAPP" class="app-item">
        <div class="logo-wrapper">
            <img src="wealthapp-logo.png" alt="WealthAPP 財富">
        </div>
        <div class="app-name">WealthAPP</div>
    </a>
</div>

<!-- 註冊 PWA Service Worker (讓網頁可離線與安裝) -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker 註冊成功: ', registration.scope);
                })
                .catch(err => {
                    console.log('ServiceWorker 註冊失敗: ', err);
                });
        });
    }
</script>

</body>
</html>
